<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missile Command - Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #050a18;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-dim: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 18px;
        }

        .section {
            text-align: left;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .contact-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }

        .email-link {
            color: var(--text);
            text-decoration: none;
            font-size: 20px;
            font-weight: 400;
            display: block;
            margin-bottom: 4px;
        }

        .email-link:hover {
            color: var(--primary);
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>Missile Command</h1>
        <p class="subtitle">City Defense Action Game</p>

        <div class="section">
            <p class="section-title">Support & Inquiry</p>
            <div class="contact-card">
                <p>If you have any questions or feedback, please contact us at:</p>
                <a href="mailto:support@leo-yssa.com" class="email-link">yssa@kakao.com</a>
                <p style="color: var(--text-dim); font-size: 14px;">We usually respond within 24 hours.</p>
            </div>
        </div>

        <div class="section">
            <p class="section-title">Bug Report</p>
            <p style="margin-bottom: 12px;">Found a bug? You can also report it on our GitHub Issues page.</p>
        </div>

        <div class="footer">
            &copy; 2026 leo_yssa. All rights reserved.
        </div>
    </div>
</body>
</html>
